  <body>
    <a target="_blank" href="https://www.comparasoftware.com.ar/vetpaw" rel="noopener">VetPaw</a> se encuentra verificado como <a href="https://www.comparasoftware.com.ar/veterinario" rel="noopener">Software para Veterinarias en Argentina</a>
    <noscript>Necesitás habilitar JavaScript para utilizar VetPaw.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/',
              updateViaCache: 'none'
            });
            registration.update().catch(() => {});
          } catch (error) {
            console.error('No se pudo registrar el modo app de VetPaw:', error);
          }
        });
      }
    </script>
  </body>

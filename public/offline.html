<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4CAF50" />
    <meta name="robots" content="noindex" />
    <title>VetPaw sin conexión</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: system-ui, sans-serif; background: #071422; color: #fff; text-align: center; }
      main { width: min(480px, 100%); padding: 36px 28px; border: 1px solid rgba(255,255,255,.12); border-radius: 24px; background: #122033; box-shadow: 0 24px 70px rgba(0,0,0,.3); }
      .icon { font-size: 56px; }
      h1 { margin-bottom: 10px; }
      p { color: rgba(255,255,255,.72); line-height: 1.55; }
      button { border: 0; border-radius: 12px; padding: 12px 18px; background: linear-gradient(135deg,#4CAF50,#FF9800); color: #fff; font: inherit; font-weight: 800; cursor: pointer; }
      button:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">📡</div>
      <h1>VetPaw está sin conexión</h1>
      <p>La aplicación volverá a conectarse cuando recuperes internet. Las pantallas que ya abriste pueden seguir disponibles.</p>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
    <script>window.addEventListener('online', () => location.reload())</script>
  </body>
</html>
